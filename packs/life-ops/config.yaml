# Life Ops Pack (Tier 2)
# Personal finance, scheduling, and life automation

persona: life-ops
version: 0.1.0
display_name: "Life Ops"
description: "Your life, engineered by AI — portfolio, expenses, calendar, subscriptions"

base: base

hermes:
  model:
    provider: openrouter
    model: deepseek/deepseek-v4-flash
  cron:
    enabled: true

skills:
  directories:
    - skills/life-ops/

cron:
  - name: daily-brief
    schedule: "30 6 * * 1-5"
    script: packs/life-ops/scripts/daily-brief.sh
    description: "Morning brief — net worth, spending, calendar, renewals"

use_cases:
  - portfolio-tracking
  - expense-tracking
  - calendar-ops
  - bill-subscriptions

channels:
  telegram:
    enabled: true
    daily_brief: true
  local:
    enabled: true

dashboard:
  enabled: true
  port: 5050