# =============================================================================
# MCP Server: github
# =============================================================================
# What it does:
#   Exposes GitHub's API as MCP tools: list/create/update issues, list and
#   merge pull requests, read and write file contents, search code, manage
#   branches, fork repos, etc. Indispensable for any workflow that involves
#   triaging issues, automating PR reviews, or syncing agent output to a
#   GitHub repo.
#
#   Tools the agent will see (auto-prefixed by Hermes):
#     - mcp_github_list_issues
#     - mcp_github_create_issue
#     - mcp_github_list_pull_requests
#     - mcp_github_create_pull_request
#     - mcp_github_search_code
#     - mcp_github_get_file_contents
#     - mcp_github_create_branch
#     - (and more)
#
# Prerequisites:
#   - Node.js 18+ installed (provides `npx`).
#   - The MCP Python SDK for Hermes itself:
#       pip install mcp
#
# API keys / tokens:
#   You need a GitHub Personal Access Token (classic or fine-grained).
#
#   Classic token (simplest):
#     1. Go to https://github.com/settings/tokens
#     2. Click "Generate new token" → "Generate new token (classic)"
#     3. Select scopes: `repo` (full), `read:org`, `workflow` (optional)
#     4. Copy the generated token (you'll only see it once!)
#     5. Paste it into the `env:` block below, OR set it in your shell:
#          export GITHUB_PERSONAL_ACCESS_TOKEN=ghp_xxxxxxxxxxxxxxxxxxxx
#        and reference it as ${GITHUB_PERSONAL_ACCESS_TOKEN} in the config.
#
#   Fine-grained token (recommended for least privilege):
#     1. Go to https://github.com/settings/personal-access-tokens
#     2. Click "Generate new token"
#     3. Grant only the repositories and permissions the agent needs.
#
#   ⚠️  Treat this token like a password. Anyone with it can act as you
#       on GitHub. Prefer fine-grained tokens scoped to specific repos.
#
# ⚠️  STATUS NOTE (as of 2026):
#   `@modelcontextprotocol/server-github` has been archived in the
#   upstream MCP servers repo. It still installs and runs correctly for
#   most use cases. Newer community forks exist; this config uses the
#   canonical name for maximum stability.
#
# Source:
#   https://github.com/modelcontextprotocol/servers (src/github — archived)
#   npm package: @modelcontextprotocol/server-github
#
# How to use:
#   Copy the YAML block below and paste it under `mcp_servers:` in
#   `~/.hermes/config.yaml`, indenting every line by 2 more spaces.
#   See ../mcp/README.md for details.
# =============================================================================

github:
  # The executable Hermes will spawn.
  command: "npx"

  # `-y` auto-confirms the npm install prompt on first run.
  args:
    - "-y"
    - "@modelcontextprotocol/server-github"

  # Environment variables passed through to the server process. Hermes
  # does NOT pass your full shell environment to MCP servers — you must
  # explicitly list every secret the server needs here.
  env:
    # The GitHub Personal Access Token the server will authenticate with.
    # Two safe options:
    #   (a) Hard-code for a single-user machine (replace the placeholder):
    #         GITHUB_PERSONAL_ACCESS_TOKEN: "ghp_REPLACE_ME"
    #   (b) Reference a shell env var (recommended for shared/CI machines):
    #         GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"
    GITHUB_PERSONAL_ACCESS_TOKEN: "ghp_REPLACE_ME_WITH_YOUR_TOKEN"

  # GitHub API calls can be slow when listing many PRs/issues. Give it room.
  timeout: 120
